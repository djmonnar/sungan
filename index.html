<style>
:root{--bg:#0c0c0c;--bg2:#111;--bg-card:#161616;--text:#e0dcd6;--muted:#777;--accent:#c9a96e;--white:#fff;--sans:'Noto Sans KR',sans-serif;--display:'Bebas Neue',sans-serif;--serif:'Cormorant Garamond',serif}

body{font-family:var(--sans);background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* 최적화: 레이어 분리 및 GPU 가속 */
.preloader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .6s ease;will-change:opacity}
.preloader.hide{opacity:0;visibility:hidden;pointer-events:none}
.preloader-text{font-family:var(--sans);font-weight:700;font-size:clamp(1.5rem,5vw,3rem);letter-spacing:.1em;color:var(--accent);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;background:rgba(12,12,12,.85);backdrop-filter:blur(15px);border-bottom:1px solid rgba(201,169,110,.08);transition:transform .4s;will-change:transform}
nav.hidden{transform:translateY(-100%)}
.nav-logo{font-family:var(--sans);font-weight:700;font-size:1.1rem;color:var(--accent);text-decoration:none;letter-spacing:.05em;cursor:pointer}
.nav-links{display:flex;gap:1.5rem;align-items:center}
.nav-links a{font-size:.7rem;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .3s;cursor:pointer}
.nav-links a:hover{color:var(--accent)}

.hamburger{display:none;cursor:pointer;flex-direction:column;gap:5px;background:none;border:none;padding:4px}
.hamburger span{width:22px;height:1.5px;background:var(--text);transition:all .3s}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(4px,5px)}
.hamburger.active span:nth-child(2){opacity:0}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(4px,-5px)}

.mobile-menu{display:none;position:fixed;inset:0;z-index:99;background:rgba(12,12,12,.98);flex-direction:column;align-items:center;justify-content:center;gap:2rem;will-change:opacity}
.mobile-menu.open{display:flex}
.mobile-menu a{font-family:var(--sans);font-size:1.3rem;font-weight:500;letter-spacing:.1em;color:var(--text);text-decoration:none}

.hero{height:100vh;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:url('https://i.ibb.co/FbDwFTZx/1-1.jpg') center/cover no-repeat;filter:brightness(.3) saturate(.7);transform:translateZ(0);animation:heroZoom 30s ease-in-out infinite alternate}
@keyframes heroZoom{0%{transform:scale(1)}100%{transform:scale(1.1)}}
.hero-content{position:relative;z-index:2;text-align:center;animation:fadeUp 1s ease .3s both}
.hero-title{font-family:var(--sans);font-weight:700;font-size:clamp(2.5rem,10vw,6rem);letter-spacing:.05em;line-height:1.1;color:var(--white)}
.hero-cta{display:inline-block;margin-top:2rem;padding:.8rem 2.5rem;border:1px solid var(--accent);color:var(--accent);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;transition:all .3s}
.hero-cta:hover{background:var(--accent);color:var(--bg)}

section{padding:5rem 2rem}
.section-label{font-size:.6rem;font-weight:400;letter-spacing:.4em;text-transform:uppercase;color:var(--accent);margin-bottom:.6rem}
.section-title{font-family:var(--display);font-size:clamp(1.8rem,4vw,3rem);letter-spacing:.08em;color:var(--white);margin-bottom:.8rem}

.cat-section{padding:3rem 2rem 4rem}
.cat-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.5rem}
.cat-header h3{font-family:var(--display);font-size:clamp(1.5rem,3vw,2.2rem);letter-spacing:.06em;color:var(--white)}
.cat-more{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);text-decoration:none;border:1px solid rgba(201,169,110,.3);padding:.5rem 1.2rem;transition:all .3s;cursor:pointer;background:none;font-family:var(--sans)}
.cat-more:hover{background:var(--accent);color:var(--bg)}

.gallery-wall{display:flex;gap:1.2rem;overflow-x:auto;padding-bottom:1rem;scrollbar-width:none}
.gallery-wall::-webkit-scrollbar{display:none}
.gallery-frame{flex:0 0 auto;width:min(320px,45vw);position:relative}
.frame-inner{background:#1a1a1a;border:1px solid #222;padding:8px 8px 30px;transition:transform .3s ease;will-change:transform}
.frame-inner:hover{transform:translateY(-5px)}
.frame-inner img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;cursor:pointer;opacity:0;transition:opacity .5s ease}
.frame-inner img.loaded{opacity:1}

/* 갤러리 페이지 전용 */
.gallery-page{display:none;min-height:100vh;padding:6rem 2rem 4rem}
.gallery-page.active{display:block}
.gallery-masonry{columns:3;column-gap:1rem}
.g-item{break-inside:avoid;margin-bottom:1rem;opacity:0;transform:translateY(20px);transition:all .5s ease}
.g-item.show{opacity:1;transform:translateY(0)}
.g-item-frame{background:#1a1a1a;border:1px solid #222;padding:6px 6px 24px}
.g-item-frame img{width:100%;display:block;cursor:pointer;background:#000}

/* 로드 더 보기 버튼 */
.load-more-container{display:flex;justify-content:center;margin-top:3rem}
.btn-load-more{background:transparent;border:1px solid var(--accent);color:var(--accent);padding:1rem 3rem;font-family:var(--sans);font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:all .3s}
.btn-load-more:hover{background:var(--accent);color:var(--bg)}
.btn-load-more:disabled{border-color:var(--muted);color:var(--muted);cursor:default}

/* 영상 그리드 */
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem;margin-top:2rem}
.video-card{background:var(--bg-card);border:1px solid rgba(255,255,255,.04);overflow:hidden}
.video-thumb{position:relative;aspect-ratio:16/9;background:#000}
.video-thumb img{width:100%;height:100%;object-fit:cover}

/* 라이트박스 */
.lightbox{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.96);display:none;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:95vw;max-height:95vh;object-fit:contain}
.lightbox-close{position:absolute;top:1rem;right:1rem;font-size:2rem;color:var(--white);background:none;border:none;cursor:pointer;padding:10px}

.fade-in{opacity:0;transform:translateY(20px);transition:opacity .6s ease-out,transform .6s ease-out;will-change:opacity,transform}
.fade-in.visible{opacity:1;transform:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){

    .gallery-frame{width:min(260px,70vw)}
}

// 메인 화면 렌더링 (요청하신 대로 2장씩만)
function renderHome() {
    const container = document.getElementById('categories');
    container.innerHTML = '';
    
    Object.entries(DATA).forEach(([key, cat]) => {
        const allImgs = Object.values(cat.subs).flat();
        const previews = allImgs.slice(0, 2); // 2장 제한

        const section = document.createElement('div');
        section.className = 'cat-section fade-in';
        section.innerHTML = `
            <div class="cat-header">
                <h3>${cat.icon} ${cat.label}</h3>
                <button class="cat-more" onclick="openGallery('${key}')">SEE ALL</button>
            </div>
            <div class="gallery-wall">
                ${previews.map(src => `
                    <div class="gallery-frame">
                        <div class="frame-inner">
                            <img src="${src}" alt="${cat.label}" loading="lazy" decoding="async" onload="this.classList.add('loaded')" onclick="openLb(this.src)">
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        container.appendChild(section);
    });
    
    initObserver();
}

// 갤러리 열기 (배치 로딩 적용)
function openGallery(key) {
    if(key === 'video') { openVideo(); return; }
    
    const cat = DATA[key];
    currentGalleryList = Object.values(cat.subs).flat();
    currentIndex = 0;
    
    document.getElementById('homePage').style.display = 'none';
    document.getElementById('videoPage').style.display = 'none';
    document.getElementById('galleryPage').classList.add('active');
    
    document.getElementById('gpLabel').textContent = "Portfolio";
    document.getElementById('gpTitle').textContent = cat.label;
    
    const grid = document.getElementById('gpGrid');
    grid.innerHTML = ''; // 초기화
    
    loadNextBatch();
    window.scrollTo(0, 0);
}

// 다음 묶음 이미지 로드 (렉 방지 핵심)
function loadNextBatch() {
    const grid = document.getElementById('gpGrid');
    const nextBatch = currentGalleryList.slice(currentIndex, currentIndex + BATCH_SIZE);
    
    nextBatch.forEach(src => {
        const item = document.createElement('div');
        item.className = 'g-item';
        item.innerHTML = `
            <div class="g-item-frame">
                <img src="${src}" loading="lazy" decoding="async" onclick="openLb(this.src)" onload="this.parentElement.parentElement.classList.add('show')">
            </div>
        `;
        grid.appendChild(item);
    });
    
    currentIndex += BATCH_SIZE;
    
    const btn = document.getElementById('btnLoadMore');
    if (currentIndex >= currentGalleryList.length) {
        btn.textContent = "모든 이미지를 불러왔습니다";
        btn.disabled = true;
    } else {
        btn.textContent = `더 보기 (${currentIndex}/${currentGalleryList.length})`;
        btn.disabled = false;
    }
}

function openVideo() {
    document.getElementById('homePage').style.display = 'none';
    document.getElementById('galleryPage').classList.remove('active');
    document.getElementById('videoPage').style.display = 'block';
    
    const grid = document.getElementById('videoGrid');
    grid.innerHTML = VIDEOS['All Films'].map(v => `
        <div class="video-card">
            <div class="video-thumb" onclick="this.innerHTML='<iframe src=\\'https://www.youtube.com/embed/${v.id}?autoplay=1\\' allowfullscreen style=\\'width:100%;height:100%;border:none\\'></iframe>'">
                <img src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg" alt="${v.title}">
                <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.2);cursor:pointer">▶</div>
            </div>
            <div style="padding:1rem">
                <p style="font-size:.8rem;font-weight:500">${v.title}</p>
            </div>
        </div>
    `).join('');
    window.scrollTo(0, 0);
}

function showHome() {
    document.getElementById('homePage').style.display = 'block';
    document.getElementById('galleryPage').classList.remove('active');
    document.getElementById('videoPage').style.display = 'none';
    window.scrollTo(0, 0);
}

// 라이트박스
function openLb(src) {
    document.getElementById('lbImg').src = src;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
}
function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
}

// 공통 기능: 내비게이션 및 모바일 메뉴
const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobileMenu');
hamburger.onclick = () => {
    hamburger.classList.toggle('active');
    mobileMenu.classList.toggle('open');
};
function closeMobile() {
    hamburger.classList.remove('active');
    mobileMenu.classList.remove('open');
}

// 스크롤 시 내비바 숨기기 최적화
let lastS = 0;
window.onscroll = () => {
    const cur = window.scrollY;
    document.getElementById('navbar').classList.toggle('hidden', cur > lastS && cur > 100);
    lastS = cur;
};

// Intersection Observer (등장 애니메이션)
function initObserver() {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
}

// 초기 실행
window.onload = () => {
    setTimeout(() => {
        document.getElementById('preloader').classList.add('hide');
        renderHome();
    }, 500);
};
</script>
</body>
</html>
