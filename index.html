<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>순간, 스튜디오 — 3D Virtual Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #c9a96e;
            --text: #e0dcd6;
            --muted: #666;
            --line: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Noto Sans KR', sans-serif;
            color: var(--text);
            touch-action: none;
        }

        body.modal-open {
            overflow: hidden;
        }

        #loader {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            visibility: visible;
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-title {
            letter-spacing: 0.5em;
            font-weight: 700;
            color: var(--accent);
            font-size: 0.95rem;
            text-align: center;
            padding: 0 20px;
        }

        .loader-bar {
            width: min(220px, 60vw);
            height: 2px;
            background: var(--line);
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .loader-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.25s ease;
            will-change: width;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            outline: none;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 24px 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .logo {
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.2em;
            color: var(--accent);
            pointer-events: auto;
            cursor: pointer;
            user-select: none;
        }

        .nav-sub {
            font-style: italic;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95rem;
            color: var(--muted);
            text-align: right;
        }

        .scroll-guide {
            position: fixed;
            bottom: max(26px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
            pointer-events: none;
            opacity: 0.82;
            transition: opacity 0.35s ease;
            will-change: opacity;
        }

        .scroll-guide.hidden {
            opacity: 0;
        }

        .scroll-guide p {
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin: 0 0 10px;
            color: var(--accent);
        }

        .mouse-icon {
            width: 20px;
            height: 35px;
            border: 1px solid var(--accent);
            border-radius: 10px;
            margin: 0 auto;
            position: relative;
        }

        .mouse-icon::after {
            content: '';
            width: 2px;
            height: 6px;
            background: var(--accent);
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            animation: scrollMove 2s infinite;
        }

        @keyframes scrollMove {
            0% { transform: translate(-50%, 0); opacity: 1; }
            100% { transform: translate(-50%, 15px); opacity: 0; }
        }

        #detail-modal {
            position: fixed;
            inset: 0;
            z-index: 500;
            background: rgba(5, 5, 5, 0.98);
            display: none;
            flex-direction: column;
            overflow-y: auto;
            overscroll-behavior: contain;
        }

        #detail-modal.active {
            display: flex;
        }

        .modal-inner {
            width: 100%;
            min-height: 100%;
            padding: 80px 20px 40px;
        }

        .modal-close {
            position: fixed;
            top: max(20px, env(safe-area-inset-top));
            right: 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 18px;
            cursor: pointer;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            z-index: 600;
            backdrop-filter: blur(4px);
        }

        .modal-header {
            max-width: 1100px;
            margin: 0 auto 40px;
            width: 100%;
        }

        .modal-header h2 {
            font-size: clamp(2rem, 4vw, 3rem);
            color: #fff;
            margin: 8px 0 0;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .modal-label {
            color: var(--accent);
            letter-spacing: 0.3em;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin: 0;
        }

        .modal-divider {
            width: 40px;
            height: 1px;
            background: var(--accent);
            margin-top: 20px;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .modal-grid img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            border: 1px solid var(--line);
            filter: grayscale(100%);
            transition: transform 0.45s ease, filter 0.45s ease, opacity 0.3s ease;
            opacity: 0;
            background: #0b0b0b;
        }

        .modal-grid img.loaded {
            opacity: 1;
        }

        .modal-grid img:hover {
            filter: grayscale(0%);
            transform: scale(1.02);
        }

        .fallback {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 24px;
            text-align: center;
            color: #fff;
            background: var(--bg);
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            nav {
                padding: 20px 16px;
            }

            .logo {
                font-size: 0.95rem;
                max-width: 50%;
                line-height: 1.3;
            }

            .nav-sub {
                font-size: 0.8rem;
                max-width: 42%;
            }

            .modal-inner {
                padding: 76px 16px 30px;
            }

            .modal-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .modal-close {
                right: 16px;
                padding: 9px 14px;
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-title">MOMENT STUDIO</div>
        <div class="loader-bar">
            <div class="loader-progress" id="progress"></div>
        </div>
    </div>

    <nav>
        <div class="logo" id="homeBtn">순간, 스튜디오</div>
        <div class="nav-sub">Virtual Experience v2.0</div>
    </nav>

    <div class="scroll-guide" id="guide">
        <p>Scroll to Explore</p>
        <div class="mouse-icon"></div>
    </div>

    <div id="canvas-container" aria-label="3D gallery"></div>

    <div id="detail-modal" aria-hidden="true">
        <button class="modal-close" id="modalCloseBtn" type="button">CLOSE GALLERY</button>
        <div class="modal-inner" id="modalBackdrop">
            <div class="modal-header">
                <p class="modal-label" id="modal-label"></p>
                <h2 id="modal-title">CATEGORY</h2>
                <div class="modal-divider"></div>
            </div>
            <div class="modal-grid" id="modal-grid"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const ARTWORKS = [
            {
                id: 'hero',
                title: '순간, 스튜디오',
                sub: '찰나의 기록',
                img: 'https://i.ibb.co/FbDwFTZx/1-1.jpg',
                label: 'WELCOME',
                gallery: [
                    'https://i.ibb.co/FbDwFTZx/1-1.jpg',
                    'https://i.ibb.co/Lhn5BrVT/1-2.jpg',
                    'https://i.ibb.co/XZ5py8NV/1-3.jpg'
                ]
            },
            {
                id: 'product',
                title: 'Product',
                sub: '제품 촬영',
                img: 'https://i.ibb.co/394NT0hM/image.jpg',
                label: 'COMMERCIAL',
                gallery: [
                    'https://i.ibb.co/394NT0hM/image.jpg',
                    'https://i.ibb.co/Q7gdWbNN/vr.jpg',
                    'https://i.ibb.co/gLPWMbw0/vr.jpg',
                    'https://i.ibb.co/bj5Hvq1t/vr.jpg'
                ]
            },
            {
                id: 'promo',
                title: 'Promotion',
                sub: '홍보 촬영',
                img: 'https://i.ibb.co/W4PFFG1T/6.jpg',
                label: 'BRANDING',
                gallery: [
                    'https://i.ibb.co/W4PFFG1T/6.jpg',
                    'https://i.ibb.co/8498hrMN/3.jpg',
                    'https://i.ibb.co/60WVSVVY/5.jpg'
                ]
            },
            {
                id: 'profile',
                title: 'Profile',
                sub: '프로필 촬영',
                img: 'https://i.ibb.co/Lhn5BrVT/1-2.jpg',
                label: 'PEOPLE',
                gallery: [
                    'https://i.ibb.co/Lhn5BrVT/1-2.jpg',
                    'https://i.ibb.co/XZ5py8NV/1-3.jpg',
                    'https://i.ibb.co/S4ZpqSjt/1-4.jpg'
                ]
            },
            {
                id: 'interior',
                title: 'Interior',
                sub: '인테리어 촬영',
                img: 'https://i.ibb.co/9kDFk5bS/3.jpg',
                label: 'SPACE',
                gallery: [
                    'https://i.ibb.co/9kDFk5bS/3.jpg',
                    'https://i.ibb.co/qYQ5W6fK/1.jpg',
                    'https://i.ibb.co/HT55zCp8/2.jpg'
                ]
            },
            {
                id: 'food',
                title: 'Food',
                sub: '음식 촬영',
                img: 'https://i.ibb.co/JwdN9TrW/image.jpg',
                label: 'TASTE',
                gallery: [
                    'https://i.ibb.co/JwdN9TrW/image.jpg',
                    'https://i.ibb.co/6VJXZd8/image.jpg',
                    'https://i.ibb.co/1tmmNPZ1/image.jpg',
                    'https://i.ibb.co/mCRvwztW/image.jpg'
                ]
            }
        ];

        let scene, camera, renderer, clock;
        let interactables = [];
        let frameGroups = [];
        let targetZ = 5;
        let currentZ = 5;
        let isModalOpen = false;
        let touchY = 0;
        let isPointerDown = false;
        let loadedCount = 0;

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const textureLoader = new THREE.TextureLoader();

        const loaderEl = document.getElementById('loader');
        const progressEl = document.getElementById('progress');
        const guideEl = document.getElementById('guide');
        const modalEl = document.getElementById('detail-modal');
        const modalGridEl = document.getElementById('modal-grid');
        const modalLabelEl = document.getElementById('modal-label');
        const modalTitleEl = document.getElementById('modal-title');
        const modalCloseBtn = document.getElementById('modalCloseBtn');
        const homeBtn = document.getElementById('homeBtn');
        const container = document.getElementById('canvas-container');

        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function getCameraLimits() {
            return {
                maxZ: 5,
                minZ: (ARTWORKS.length - 1) * -12 - 5
            };
        }

        function updateGuideVisibility() {
            if (targetZ < 4) {
                guideEl.classList.add('hidden');
            } else {
                guideEl.classList.remove('hidden');
            }
        }

        function updateLoader() {
            loadedCount += 1;
            const progress = (loadedCount / ARTWORKS.length) * 100;
            progressEl.style.width = `${progress}%`;

            if (loadedCount >= ARTWORKS.length) {
                setTimeout(() => {
                    loaderEl.classList.add('hidden');
                }, 350);
            }
        }

        function createFallbackMessage(message) {
            document.body.innerHTML = `<div class="fallback">${message}</div>`;
        }

        function createRenderer() {
            try {
                renderer = new THREE.WebGLRenderer({
                    antialias: true,
                    alpha: false,
                    powerPreference: 'high-performance'
                });
            } catch (error) {
                createFallbackMessage('이 브라우저에서는 3D 갤러리를 실행할 수 없습니다.');
                throw error;
            }

            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.8));
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);
        }

        function optimizeTexture(tex) {
            tex.encoding = THREE.sRGBEncoding;
            tex.anisotropy = Math.min(4, renderer.capabilities.getMaxAnisotropy?.() || 1);
            tex.generateMipmaps = true;
            tex.minFilter = THREE.LinearMipmapLinearFilter;
            tex.magFilter = THREE.LinearFilter;
            tex.wrapS = THREE.ClampToEdgeWrapping;
            tex.wrapT = THREE.ClampToEdgeWrapping;
            tex.needsUpdate = true;
        }

        function preloadModalImages(urls) {
            urls.forEach((url) => {
                const img = new Image();
                img.decoding = 'async';
                img.loading = 'eager';
                img.src = url;
            });
        }

        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.FogExp2(0x050505, 0.08);

            camera = new THREE.PerspectiveCamera(
                60,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, 0, 5);

            clock = new THREE.Clock();

            const ambient = new THREE.AmbientLight(0xffffff, 0.45);
            scene.add(ambient);

            const floorGeo = new THREE.PlaneGeometry(20, 200);
            const floorMat = new THREE.MeshStandardMaterial({
                color: 0x0a0a0a,
                roughness: 0.14,
                metalness: 0.45
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -2.5;
            scene.add(floor);
        }

        function createFrames() {
            ARTWORKS.forEach((art, i) => {
                const zPos = i * -12;
                const side = i === 0 ? 0 : (i % 2 === 1 ? 4 : -4);

                const group = new THREE.Group();
                group.position.set(side, 0, zPos);

                if (i !== 0) {
                    group.rotation.y = side > 0 ? -0.5 : 0.5;
                }

                const frameGeo = new THREE.BoxGeometry(3.2, 4.2, 0.1);
                const frameMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
                const frameMesh = new THREE.Mesh(frameGeo, frameMat);
                group.add(frameMesh);

                const hitGeo = new THREE.PlaneGeometry(3.5, 4.5);
                const hitMat = new THREE.MeshBasicMaterial({
                    transparent: true,
                    opacity: 0,
                    side: THREE.DoubleSide
                });
                const hitMesh = new THREE.Mesh(hitGeo, hitMat);
                hitMesh.position.z = 0.08;
                hitMesh.userData = art;
                interactables.push(hitMesh);
                group.add(hitMesh);

                const light = new THREE.PointLight(0xc9a96e, 1.25, 8);
                light.position.set(0, 3, 1);
                group.add(light);

                frameGroups.push(group);
                scene.add(group);

                textureLoader.load(
                    art.img,
                    (tex) => {
                        optimizeTexture(tex);

                        const imgGeo = new THREE.PlaneGeometry(3, 4);
                        const imgMat = new THREE.MeshBasicMaterial({ map: tex });
                        const imgMesh = new THREE.Mesh(imgGeo, imgMat);
                        imgMesh.position.z = 0.06;
                        group.add(imgMesh);

                        preloadModalImages(art.gallery);
                        updateLoader();
                    },
                    undefined,
                    () => {
                        console.warn('이미지 로드 실패:', art.img);

                        const fallbackGeo = new THREE.PlaneGeometry(3, 4);
                        const fallbackMat = new THREE.MeshBasicMaterial({
                            color: 0x111111
                        });
                        const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
                        fallbackMesh.position.z = 0.06;
                        group.add(fallbackMesh);

                        updateLoader();
                    }
                );
            });
        }

        function openModal(data) {
            isModalOpen = true;
            document.body.classList.add('modal-open');
            modalLabelEl.textContent = data.label;
            modalTitleEl.textContent = data.sub;

            modalGridEl.innerHTML = data.gallery.map((img, idx) => {
                return `<img src="${img}" alt="${data.title} ${idx + 1}" loading="lazy" decoding="async" referrerpolicy="no-referrer">`;
            }).join('');

            modalGridEl.querySelectorAll('img').forEach((img) => {
                img.addEventListener('load', () => img.classList.add('loaded'), { once: true });
                img.addEventListener('error', () => {
                    img.classList.add('loaded');
                    img.alt = '이미지를 불러올 수 없습니다';
                }, { once: true });
            });

            modalEl.classList.add('active');
            modalEl.setAttribute('aria-hidden', 'false');
        }

        function closeModal() {
            isModalOpen = false;
            modalEl.classList.remove('active');
            modalEl.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('modal-open');
        }

        function handlePointerSelect(clientX, clientY) {
            if (isModalOpen) return;

            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactables, false);

            if (intersects.length > 0) {
                const data = intersects[0].object.userData;
                if (data.id !== 'hero') {
                    openModal(data);
                }
            }
        }

        function handleWheel(e) {
            if (isModalOpen) return;

            targetZ -= e.deltaY * 0.01;
            const { minZ, maxZ } = getCameraLimits();
            targetZ = clamp(targetZ, minZ, maxZ);
            updateGuideVisibility();
        }

        function handleTouchStart(e) {
            if (isModalOpen) return;
            if (!e.touches || !e.touches.length) return;
            touchY = e.touches[0].clientY;
        }

        function handleTouchMove(e) {
            if (isModalOpen) return;
            if (!e.touches || !e.touches.length) return;

            e.preventDefault();
            const currentTouchY = e.touches[0].clientY;
            const delta = touchY - currentTouchY;
            touchY = currentTouchY;

            targetZ -= delta * 0.03;
            const { minZ, maxZ } = getCameraLimits();
            targetZ = clamp(targetZ, minZ, maxZ);
            updateGuideVisibility();
        }

        function handleResize() {
            if (!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.8));
        }

        function animate() {
            requestAnimationFrame(animate);

            currentZ += (targetZ - currentZ) * 0.06;
            camera.position.z = currentZ;

            const time = clock.getElapsedTime();

            for (let i = 0; i < frameGroups.length; i++) {
                const group = frameGroups[i];
                const distance = Math.abs(camera.position.z - group.position.z);

                if (distance < 28) {
                    group.visible = true;
                    group.position.y = Math.sin(time + i) * 0.05;
                } else {
                    group.visible = true;
                    group.position.y = 0;
                }
            }

            renderer.render(scene, camera);
        }

        function bindEvents() {
            window.addEventListener('wheel', handleWheel, { passive: true });

            window.addEventListener('pointerdown', () => {
                isPointerDown = true;
            });

            window.addEventListener('pointerup', (e) => {
                if (!isPointerDown) return;
                isPointerDown = false;

                if (e.pointerType === 'mouse' || e.pointerType === 'touch' || e.pointerType === 'pen') {
                    handlePointerSelect(e.clientX, e.clientY);
                }
            });

            window.addEventListener('touchstart', handleTouchStart, { passive: true });
            window.addEventListener('touchmove', handleTouchMove, { passive: false });

            window.addEventListener('resize', handleResize);

            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && isModalOpen) {
                    closeModal();
                }
            });

            modalCloseBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                closeModal();
            });

            modalEl.addEventListener('click', (e) => {
                if (e.target === modalEl || e.target.id === 'modalBackdrop') {
                    closeModal();
                }
            });

            modalEl.querySelector('.modal-inner').addEventListener('click', (e) => {
                e.stopPropagation();
            });

            homeBtn.addEventListener('click', () => {
                targetZ = 5;
                closeModal();
                updateGuideVisibility();
            });
        }

        function init() {
            if (!window.THREE) {
                createFallbackMessage('Three.js를 불러오지 못했습니다.');
                return;
            }

            createRenderer();
            initScene();
            createFrames();
            bindEvents();
            updateGuideVisibility();
            animate();
        }

        init();
    </script>
</body>
</html>
