<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>순간, 스튜디오</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

  <style>
    /* ── VARIABLES ─────────────────────────────────────────── */
    :root {
      --bg:      #070706;
      --surface: #0f0f0e;
      --border:  rgba(255,255,255,.08);
      --border2: rgba(255,255,255,.14);
      --text:    #f0ece6;
      --muted:   rgba(240,236,230,.50);
      --muted2:  rgba(240,236,230,.28);
      --accent:  #c8a86c;
      --radius:  22px;
      --st: max(16px, env(safe-area-inset-top));
      --sb: max(20px, env(safe-area-inset-bottom));
    }

    /* ── RESET ─────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      user-select: none;
      -webkit-user-select: none;
    }
    img { display: block; width: 100%; pointer-events: none; }
    button { font: inherit; background: none; border: none; color: inherit; cursor: pointer; }
    a { color: inherit; text-decoration: none; }

    /* ── GRAIN OVERLAY ─────────────────────────────────────── */
    .grain {
      position: fixed; inset: 0; z-index: 200;
      pointer-events: none; opacity: .03;
      background-image:
        radial-gradient(circle at 20% 20%, #fff .5px, transparent .6px),
        radial-gradient(circle at 80% 60%, #fff .5px, transparent .6px),
        radial-gradient(circle at 50% 85%, #fff .5px, transparent .6px);
      background-size: 32px 32px, 38px 38px, 44px 44px;
    }

    /* ── DOORS (입장 애니메이션) ────────────────────────────── */
    #doors {
      position: fixed; inset: 0; z-index: 500;
      display: flex;
      perspective: 1400px;
      transition: opacity .6s ease;
    }
    #doors.faded { opacity: 0; pointer-events: none; }

    /* 왼쪽 문 / 오른쪽 문 */
    .door {
      flex: 1; height: 100%;
      position: relative;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      will-change: transform;
      transition: transform 1.05s cubic-bezier(.7, 0, .28, 1);
      /* 나무결 느낌의 수직 그라디언트 */
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0px, transparent 38px,
          rgba(255,255,255,.013) 38px, rgba(255,255,255,.013) 39px
        ),
        linear-gradient(180deg, #0c0b0a 0%, #070706 100%);
    }
    .door-l {
      transform-origin: left center;
      border-right: 1px solid rgba(200,168,108,.18);
    }
    .door-r {
      transform-origin: right center;
      border-left: 1px solid rgba(200,168,108,.18);
    }

    /* 문이 열릴 때 */
    #doors.opening .door-l { transform: rotateY(-92deg); }
    #doors.opening .door-r { transform: rotateY( 92deg); }

    /* 문 손잡이 */
    .door-l::after, .door-r::before {
      content: '';
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 5px; height: 44px; border-radius: 3px;
      background: linear-gradient(180deg,
        rgba(200,168,108,.5), rgba(200,168,108,.25));
      box-shadow: 0 0 12px rgba(200,168,108,.12);
    }
    .door-l::after  { right: 22px; }
    .door-r::before { left:  22px; }

    /* 문 위의 로고 (두 문 중앙에 걸쳐 표시) */
    #door-logo {
      position: fixed; inset: 0; z-index: 501;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      pointer-events: none;
      transition: opacity .5s ease;
    }
    #door-logo.faded { opacity: 0; }

    .pre-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem; font-weight: 300; letter-spacing: .08em;
      opacity: 0; animation: fadeUp .9s .2s forwards;
    }
    .pre-sub {
      font-size: .68rem; letter-spacing: .32em; text-transform: uppercase;
      color: var(--muted); opacity: 0; animation: fadeUp .9s .5s forwards;
    }
    /* 문 중앙 금빛 선 */
    .pre-line {
      width: 36px; height: 1px;
      background: var(--accent); opacity: 0;
      animation: fadeUp .6s .7s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HEADER ────────────────────────────────────────────── */
    #hdr {
      position: fixed; top: 0; left: 0; right: 0; z-index: 40;
      padding: var(--st) 20px 14px;
      display: flex; justify-content: space-between; align-items: flex-end;
      background: linear-gradient(to bottom,
        rgba(7,7,6,.88) 0%, rgba(7,7,6,.38) 65%, transparent);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      pointer-events: none;
    }
    .hdr-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem; font-weight: 300; letter-spacing: .07em;
    }
    .hdr-idx {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: .72rem; letter-spacing: .2em; color: var(--muted);
    }

    /* ── STAGE / CAROUSEL ──────────────────────────────────── */
    #stage {
      position: fixed; inset: 0;
      perspective: 1500px;
      perspective-origin: 50% 50%;
      /* overflow visible → adjacent cards peek from screen edges */
    }
    #track {
      position: absolute; inset: 0;
    }

    /* ── CATEGORY CARDS ────────────────────────────────────── */
    .c-card {
      position: absolute;
      top: 0; bottom: 0;
      width: 88vw; left: 6vw;
      border-radius: var(--radius);
      overflow: hidden;
      will-change: transform, opacity;
      transition: transform .55s cubic-bezier(.25,.46,.45,.94),
                  opacity  .45s ease;
    }
    /* Inset border ring for premium look */
    .c-card::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: var(--radius);
      border: 1px solid var(--border2);
      z-index: 3; pointer-events: none;
    }

    .c-img-wrap {
      position: absolute; inset: 0; overflow: hidden;
    }
    .c-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .4s ease;
      will-change: transform;
    }
    /* Multi-layer gradient for depth */
    .c-img-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background:
        linear-gradient(to top,
          rgba(0,0,0,.88) 0%,
          rgba(0,0,0,.32) 42%,
          rgba(0,0,0,.08) 68%,
          transparent 100%),
        linear-gradient(to bottom,
          rgba(0,0,0,.28) 0%,
          transparent 28%);
    }

    .c-body {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
      padding: 0 22px calc(var(--sb) + 80px);
    }
    .c-room {
      font-size: .66rem; letter-spacing: .28em; text-transform: uppercase;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      color: var(--accent); margin-bottom: 8px;
    }
    .c-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.2rem, 13vw, 5.5rem);
      line-height: .88; font-weight: 300; letter-spacing: -.02em;
    }
    .c-ko {
      font-size: .78rem; letter-spacing: .12em; color: var(--muted);
      margin-top: 8px;
    }
    .c-count {
      font-size: .68rem; color: var(--muted2); margin-top: 4px;
      letter-spacing: .1em;
    }
    .c-actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }

    .btn-more {
      display: inline-flex; align-items: center; gap: 8px;
      height: 44px; padding: 0 20px; border-radius: 999px;
      border: 1px solid var(--border2);
      background: rgba(255,255,255,.09);
      font-size: .82rem; letter-spacing: .06em;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: background .2s, transform .15s;
    }
    .btn-more:active { transform: scale(.97); background: rgba(255,255,255,.16); }
    .btn-more.gold {
      background: var(--accent); border-color: transparent;
      color: #18120a; font-weight: 700;
    }

    /* About card special styling */
    .about-lines { margin-top: 18px; display: grid; gap: 0; }
    .about-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,.07);
      font-size: .84rem; gap: 12px;
    }
    .about-row span { color: var(--muted); flex-shrink: 0; }
    .about-row strong { text-align: right; font-weight: 500; }

    /* ── HUD / DOTS ─────────────────────────────────────────── */
    #hud {
      position: fixed; bottom: calc(var(--sb) + 16px);
      left: 0; right: 0; z-index: 40;
      display: flex; flex-direction: column; align-items: center; gap: 9px;
      pointer-events: none;
    }
    .hud-dots { display: flex; gap: 7px; align-items: center; }
    .hud-dot {
      height: 5px; border-radius: 999px;
      background: rgba(255,255,255,.22);
      transition: width .35s ease, background .35s;
      width: 5px;
    }
    .hud-dot.on { width: 26px; background: var(--text); }
    .hud-tip {
      font-size: .64rem; letter-spacing: .2em;
      color: var(--muted2); text-transform: uppercase;
    }

    /* ── SIDE ARROWS ─────────────────────────────────────────── */
    .arr-wrap {
      position: fixed; bottom: calc(var(--sb) + 62px);
      left: 0; right: 0; z-index: 40;
      display: flex; justify-content: space-between; padding: 0 8px;
      pointer-events: none;
    }
    .arr {
      pointer-events: all;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      display: grid; place-items: center;
      font-size: 1.2rem; line-height: 1;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      transition: opacity .3s, background .2s;
    }
    .arr:active { background: rgba(255,255,255,.13); }
    .arr.hide { opacity: 0; pointer-events: none; }

    /* ── DETAIL OVERLAY ──────────────────────────────────────── */
    #detail {
      position: fixed; inset: 0; z-index: 60;
      background: var(--bg);
      transform: translateY(100%);
      transition: transform .52s cubic-bezier(.32,.72,0,1);
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    #detail.open { transform: translateY(0); }

    .d-header {
      position: sticky; top: 0; z-index: 10;
      padding: var(--st) 18px 14px;
      display: flex; justify-content: space-between; align-items: flex-end;
      background: linear-gradient(to bottom, var(--bg) 75%, transparent);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .d-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .8rem; color: var(--muted); padding: 6px 0;
    }
    .d-back svg { width: 15px; height: 15px; }
    .d-cat-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; font-weight: 300; letter-spacing: .08em;
      color: var(--muted);
    }

    .d-body { padding: 4px 14px calc(var(--sb) + 48px); }

    .d-head {
      padding: 12px 4px 22px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .d-head h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.5rem, 17vw, 6.5rem);
      line-height: .86; font-weight: 300; letter-spacing: -.03em;
    }
    .d-head p {
      margin-top: 14px; font-size: .88rem;
      line-height: 1.88; color: var(--muted);
    }

    /* Photo grid – masonry-style 2 col */
    .photo-grid { columns: 2; column-gap: 8px; }
    .p-item {
      break-inside: avoid; margin-bottom: 8px;
      border-radius: 14px; overflow: hidden;
      position: relative; cursor: pointer;
      border: 1px solid var(--border);
    }
    .p-item img { width: 100%; display: block; transition: transform .4s ease; }
    .p-item:active img { transform: scale(.97); }
    .p-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 28px 10px 10px;
      background: linear-gradient(to top, rgba(0,0,0,.72), transparent);
      font-size: .7rem; letter-spacing: .08em;
      color: rgba(255,255,255,.82);
    }

    /* Video cards */
    .video-grid { display: grid; gap: 12px; }
    .v-card {
      border: 1px solid var(--border); border-radius: 18px;
      overflow: hidden; background: var(--surface);
    }
    .v-thumb { position: relative; aspect-ratio: 16 / 10; overflow: hidden; }
    .v-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .v-play {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      background: rgba(0,0,0,.28);
    }
    .v-circle {
      width: 54px; height: 54px; border-radius: 50%;
      background: rgba(255,255,255,.92);
      display: grid; place-items: center;
      box-shadow: 0 10px 36px rgba(0,0,0,.45);
    }
    .v-circle svg { width: 18px; height: 18px; fill: #0a0a09; margin-left: 3px; }
    .v-meta { padding: 14px 16px; }
    .v-meta strong { font-size: .95rem; font-weight: 600; }
    .v-meta span {
      display: block; margin-top: 3px;
      font-size: .78rem; color: var(--muted);
    }

    /* ── LIGHTBOX ─────────────────────────────────────────────── */
    #lb {
      position: fixed; inset: 0; z-index: 80;
      background: rgba(0,0,0,.97);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
    }
    #lb.open { display: flex; }

    .lb-close {
      position: fixed; top: calc(var(--st) + 4px); right: 16px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,.1);
      display: grid; place-items: center;
      font-size: 1rem; z-index: 5;
      transition: background .2s;
    }
    .lb-close:active { background: rgba(255,255,255,.2); }

    #lb-wrap {
      flex: 1; width: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 0 8px; overflow: hidden;
    }
    #lb-img {
      max-width: 100%; max-height: 84svh;
      object-fit: contain; border-radius: 8px;
      transition: opacity .22s ease;
    }
    #lb-img.dim { opacity: 0; }

    .lb-foot {
      width: 100%;
      padding: 12px 20px calc(var(--sb) + 6px);
      display: flex; align-items: center; justify-content: space-between;
    }
    #lb-ctr { font-size: .76rem; color: var(--muted); letter-spacing: .14em; }
    .lb-navs { display: flex; gap: 8px; }
    .lb-navs button {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,.08);
      border: 1px solid var(--border2);
      font-size: 1.4rem; display: grid; place-items: center;
      transition: background .2s;
    }
    .lb-navs button:active { background: rgba(255,255,255,.16); }
    .lb-navs button:disabled { opacity: .3; }
  </style>
</head>

<div class="grain"></div>

<div id="doors">
  <div class="door door-l"></div>
  <div class="door door-r"></div>
</div>
<!-- 문 위 로고 (별도 레이어로 문과 함께 페이드) -->
<div id="door-logo">

<!-- HEADER -->

</header>

<!-- STAGE (3D Carousel) -->
<div id="stage">
  <div id="track"><!-- JS로 카드 생성 --></div>
</div>

<!-- SIDE ARROWS -->
<div class="arr-wrap">
  <button class="arr hide" id="arr-l">‹</button>
  <button class="arr" id="arr-r">›</button>
</div>

<!-- BOTTOM HUD -->
<div id="hud">
  <div class="hud-dots" id="dots"></div>
  <div class="hud-tip">좌우로 넘기기</div>
</div>

<!-- DETAIL OVERLAY -->
<div id="detail">
  <div class="d-header">
    <button class="d-back" id="d-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      돌아가기
    </button>
    <div class="d-cat-name" id="d-name"></div>
  </div>
  <div class="d-body" id="d-body"></div>
</div>

<!-- LIGHTBOX -->
<div id="lb">
  <button class="lb-close" id="lb-close">✕</button>
  <div id="lb-wrap"><img id="lb-img" src="" alt="갤러리 이미지"></div>
  <div class="lb-foot">
    <div id="lb-ctr">1 / 1</div>
    <div class="lb-navs">
      <button id="lb-p">‹</button>
      <button id="lb-n">›</button>
    </div>
  </div>
</div>

    id: 'about', en: 'Contact', ko: '문의', room: 'About',
    feat: 'https://i.ibb.co/ks6QB1J7/1-1.jpg',
    type: 'about',
  }
];

/* ════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════ */
let cur = 0;
const N = CATS.length;

/* ════════════════════════════════════════════════════
   ELEMENTS
════════════════════════════════════════════════════ */
const track   = document.getElementById('track');
const hdrIdx  = document.getElementById('hdr-idx');
const dotsEl  = document.getElementById('dots');
const arrL    = document.getElementById('arr-l');
const arrR    = document.getElementById('arr-r');
const detail  = document.getElementById('detail');
const dName   = document.getElementById('d-name');
const dBody   = document.getElementById('d-body');
const dBack   = document.getElementById('d-back');
const lb      = document.getElementById('lb');
const lbImg   = document.getElementById('lb-img');
const lbCtr   = document.getElementById('lb-ctr');
const lbClose = document.getElementById('lb-close');
const lbP     = document.getElementById('lb-p');
const lbN     = document.getElementById('lb-n');

/* ════════════════════════════════════════════════════
   BUILD CARDS
════════════════════════════════════════════════════ */
function buildCards() {
  CATS.forEach((cat, i) => {
    const card = document.createElement('div');
    card.className = 'c-card';
    card.dataset.i = i;

    let bodyHTML = '';

    if (cat.type === 'about') {
      bodyHTML = `
        <div class="c-room">${cat.room}</div>
        <div class="c-title">${cat.en}</div>
        <div class="about-lines">
          <div class="about-row"><span>Email</span><strong>momentstudio@example.com</strong></div>
          <div class="about-row"><span>Instagram</span><strong>@moment.studio</strong></div>
          <div class="about-row"><span>Location</span><strong>경남 진주시</strong></div>
        </div>
        <div class="c-actions">
          <a class="btn-more gold" href="mailto:momentstudio@example.com">이메일 문의</a>
        </div>`;
    } else {
      bodyHTML = `
        <div class="c-room">${cat.room}</div>
        <div class="c-title">${cat.en}</div>
        <div class="c-ko">${cat.ko}</div>
        <div class="c-count">${cat.items.length}점 수록</div>
        <div class="c-actions">
          <button class="btn-more gold" data-open="${cat.id}">전체 보기</button>
        </div>`;
    }

    card.innerHTML = `
      <div class="c-img-wrap">
        <img
          src="${cat.feat}"
          alt="${cat.en}"
          loading="${i === 0 ? 'eager' : 'lazy'}"
          fetchpriority="${i === 0 ? 'high' : 'auto'}"
          referrerpolicy="no-referrer"
          decoding="async">
      </div>
      <div class="c-body">${bodyHTML}</div>`;

    track.appendChild(card);
  });

  /* Bind 전체 보기 buttons */
  track.querySelectorAll('[data-open]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openDetail(btn.dataset.open);
    });
  });

  setPositions(false);
  buildDots();
  updateNav();
}

/* ════════════════════════════════════════════════════
   CAROUSEL POSITIONING  (3D coverflow)
════════════════════════════════════════════════════ */
function setPositions(animate = true) {
  const cards = track.querySelectorAll('.c-card');
  cards.forEach((card, i) => {
    const off    = i - cur;
    const absOff = Math.abs(off);

    /* 3D transform values */
    const tx      = off * 80;               /* vw  – adjacent cards peek ±14vw */
    const rotY    = off * -14;              /* deg – coverflow tilt */
    const scale   = 1 - absOff * 0.085;    /* scale down non-active */
    const opacity = absOff === 0 ? 1 : absOff === 1 ? 0.6 : 0.15;

    if (!animate) {
      card.style.transition = 'none';
    }

    card.style.transform =
      `translateX(${tx}vw) rotateY(${rotY}deg) scale(${scale})`;
    card.style.opacity      = opacity;
    card.style.zIndex       = 10 - absOff;
    card.style.pointerEvents = off === 0 ? 'auto' : 'none';

    if (!animate) {
      /* Force reflow so transition: none takes effect, then restore */
      void card.offsetHeight;
      card.style.transition = '';
    }
  });

  updateDots();
  updateHeader();
  updateNav();
}

/* ════════════════════════════════════════════════════
   DOTS / HEADER / ARROWS
════════════════════════════════════════════════════ */
function buildDots() {
  dotsEl.innerHTML = '';
  CATS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'hud-dot' + (i === 0 ? ' on' : '');
    dotsEl.appendChild(d);
  });
}
function updateDots() {
  dotsEl.querySelectorAll('.hud-dot')
    .forEach((d, i) => d.classList.toggle('on', i === cur));
}
function updateHeader() {
  hdrIdx.textContent =
    `${String(cur + 1).padStart(2,'0')} / ${String(N).padStart(2,'0')}`;
}
function updateNav() {
  arrL.classList.toggle('hide', cur === 0);
  arrR.classList.toggle('hide', cur === N - 1);
}

/* ════════════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════════════ */
function goTo(n) {
  if (n < 0 || n >= N) return;
  cur = n;
  setPositions(true);
}

arrL.addEventListener('click', () => goTo(cur - 1));
arrR.addEventListener('click', () => goTo(cur + 1));

/* ════════════════════════════════════════════════════
   TOUCH / SWIPE  (carousel)
════════════════════════════════════════════════════ */
let tsX = 0, tsY = 0, swipeDir = null, swiping = false;

document.getElementById('stage').addEventListener('touchstart', e => {
  if (detail.classList.contains('open') || lb.classList.contains('open')) return;
  tsX = e.touches[0].clientX;
  tsY = e.touches[0].clientY;
  swiping = true;
  swipeDir = null;
}, { passive: true });

document.getElementById('stage').addEventListener('touchmove', e => {
  if (!swiping) return;
  const dx = e.touches[0].clientX - tsX;
  const dy = e.touches[0].clientY - tsY;
  if (!swipeDir) swipeDir = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
  if (swipeDir === 'h') e.preventDefault();
}, { passive: false });

document.getElementById('stage').addEventListener('touchend', e => {
  if (!swiping || swipeDir !== 'h') { swiping = false; return; }
  const dx = e.changedTouches[0].clientX - tsX;
  swiping = false; swipeDir = null;
  if (Math.abs(dx) < 40) return;
  goTo(dx < 0 ? cur + 1 : cur - 1);
});

/* ════════════════════════════════════════════════════
   KEYBOARD
════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (lb.classList.contains('open')) {
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowLeft')   lbStep(-1);
    if (e.key === 'ArrowRight')  lbStep(1);
    return;
  }
  if (detail.classList.contains('open')) {
    if (e.key === 'Escape') closeDetail();
    return;
  }
  if (e.key === 'ArrowLeft')  goTo(cur - 1);
  if (e.key === 'ArrowRight') goTo(cur + 1);
});

/* ════════════════════════════════════════════════════
   GYROSCOPE PARALLAX  (active card image)
════════════════════════════════════════════════════ */
if (window.DeviceOrientationEvent) {
  window.addEventListener('deviceorientation', e => {
    if (detail.classList.contains('open')) return;
    const gx = Math.max(-1, Math.min(1, (e.gamma || 0) / 22));
    const gy = Math.max(-1, Math.min(1, ((e.beta || 0) - 30) / 36));
    const cards = track.querySelectorAll('.c-card');
    const active = cards[cur];
    if (!active) return;
    const img = active.querySelector('img');
    if (img) img.style.transform = `translate(${gx * 12}px, ${gy * 7}px) scale(1.07)`;
  }, { passive: true });
}

/* ════════════════════════════════════════════════════
   DETAIL PAGE
════════════════════════════════════════════════════ */
function openDetail(id) {
  const cat = CATS.find(c => c.id === id);
  if (!cat) return;

  dName.textContent = cat.ko;
  dBody.innerHTML   = '';

  /* Heading */
  const head = document.createElement('div');
  head.className = 'd-head';
  head.innerHTML = `<h2>${cat.en}</h2><p>${cat.desc || ''}</p>`;
  dBody.appendChild(head);

  if (cat.type === 'photo') {
    const grid = document.createElement('div');
    grid.className = 'photo-grid';
    const srcs = cat.items.map(it => it.src);

    cat.items.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'p-item';
      div.innerHTML = `
        <img src="${item.src}" alt="${item.title}"
             loading="lazy" referrerpolicy="no-referrer" decoding="async">
        <div class="p-label">${item.title}</div>`;
      div.addEventListener('click', () => openLightbox(srcs, idx));
      grid.appendChild(div);
    });
    dBody.appendChild(grid);

  } else if (cat.type === 'video') {
    const grid = document.createElement('div');
    grid.className = 'video-grid';
    cat.items.forEach(item => {
      const a = document.createElement('a');
      a.className = 'v-card';
      a.href = item.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
      a.innerHTML = `
        <div class="v-thumb">
          <img src="${item.thumb}" alt="${item.title}"
               loading="lazy" referrerpolicy="no-referrer" decoding="async">
          <div class="v-play">
            <div class="v-circle">
              <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            </div>
          </div>
        </div>
        <div class="v-meta">
          <strong>${item.title}</strong>
          <span>${item.sub}</span>
        </div>`;
      grid.appendChild(a);
    });
    dBody.appendChild(grid);
  }

  detail.scrollTop = 0;
  detail.classList.add('open');
}

function closeDetail() { detail.classList.remove('open'); }
dBack.addEventListener('click', closeDetail);

/* ════════════════════════════════════════════════════
   LIGHTBOX
════════════════════════════════════════════════════ */
let lbSrcs = [], lbIdx = 0, lbTsX = 0;

function openLightbox(srcs, idx) {
  lbSrcs = srcs; lbIdx = idx;
  renderLb(false);
  lb.classList.add('open');
}
function closeLightbox() { lb.classList.remove('open'); }

function renderLb(fade = true) {
  if (fade) {
    lbImg.classList.add('dim');
    setTimeout(() => { lbImg.src = lbSrcs[lbIdx]; lbImg.classList.remove('dim'); }, 200);
  } else {
    lbImg.src = lbSrcs[lbIdx];
  }
  lbCtr.textContent   = `${lbIdx + 1} / ${lbSrcs.length}`;
  lbP.disabled        = lbIdx === 0;
  lbN.disabled        = lbIdx === lbSrcs.length - 1;
}

function lbStep(dir) {
  const next = lbIdx + dir;
  if (next < 0 || next >= lbSrcs.length) return;
  lbIdx = next; renderLb(true);
}

lbClose.addEventListener('click', closeLightbox);
lbP.addEventListener('click', () => lbStep(-1));
lbN.addEventListener('click', () => lbStep(1));

/* Tap outside image → close */
lb.addEventListener('click', e => {
  if (e.target === lb || e.target === document.getElementById('lb-wrap')) closeLightbox();
});

/* Swipe in lightbox */
lb.addEventListener('touchstart', e => { lbTsX = e.touches[0].clientX; }, { passive: true });
lb.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - lbTsX;
  if (Math.abs(dx) < 40) return;
  lbStep(dx < 0 ? 1 : -1);
});

/* ════════════════════════════════════════════════════
   DOOR OPENING SEQUENCE
   ① 이미지 로드 완료 OR 최소 대기(1.4s) → 둘 다 준비되면 문 열기
   ② 문 스윙 애니메이션 1.05s
   ③ 로고 + 문 페이드아웃 → display:none
════════════════════════════════════════════════════ */
const doors    = document.getElementById('doors');
const doorLogo = document.getElementById('door-logo');

let imgReady  = false;
let timeReady = false;

function tryOpen() {
  if (!imgReady || !timeReady) return;
  /* 1. 문 열기 */
  doors.classList.add('opening');
  doorLogo.classList.add('faded');

  /* 2. 스윙 거의 완료 후 (0.85s) → 전체 페이드 */
  setTimeout(() => {
    doors.classList.add('faded');
  }, 850);

  /* 3. 완전히 사라진 후 DOM 제거 */
  setTimeout(() => {
    doors.style.display    = 'none';
    doorLogo.style.display = 'none';
  }, 1500);
}

/* 최소 대기: 로고 애니메이션이 보이도록 1400ms */
setTimeout(() => { timeReady = true; tryOpen(); }, 1400);

/* 첫 이미지 로드 감지 */
const heroProbe = new Image();
heroProbe.onload = heroProbe.onerror = () => { imgReady = true; tryOpen(); };
heroProbe.referrerPolicy = 'no-referrer';
heroProbe.src = CATS[0].feat;

/* 절대 폴백: 4초 후 강제 열기 */
setTimeout(() => { imgReady = timeReady = true; tryOpen(); }, 4000);

/* ════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════ */
buildCards();
</script>
</body>
</html>
